name: Update Cask

on:
  schedule:
    - cron: "0 6 * * *"  # daily at 06:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for new release
        id: release
        run: |
          LATEST=$(curl -s https://api.github.com/repos/lvcabral/carabiner/releases/latest \
            | jq -r '.tag_name | ltrimstr("v")')
          CURRENT=$(grep 'version "' Casks/carabiner.rb | grep -o '"[^"]*"' | tr -d '"')
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$LATEST" = "$CURRENT" ]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute SHA256 and update cask
        if: steps.release.outputs.up_to_date == 'false'
        run: |
          VERSION="${{ steps.release.outputs.latest }}"
          URL="https://github.com/lvcabral/carabiner/releases/download/v${VERSION}/Carabiner-${VERSION}-universal.dmg"
          SHA=$(curl -sL "$URL" | shasum -a 256 | awk '{print $1}')
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Casks/carabiner.rb
          sed -i "s/sha256 \".*\"/sha256 \"${SHA}\"/" Casks/carabiner.rb

      - name: Commit and push
        if: steps.release.outputs.up_to_date == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/carabiner.rb
          git commit -m "Update carabiner to ${{ steps.release.outputs.latest }}"
          git push
